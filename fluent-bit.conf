[SERVICE]
    Flush         2
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf

# INPUT 1: App file logs
[INPUT]
    Name              tail
    Path              /logs/app.log
    Parser            json
    Tag               app.logs
    Refresh_Interval  2
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On
    DB                /fluent-bit/state/app.db

# INPUT 2: Docker container logs
[INPUT]
    Name              tail
    Path              /var/lib/docker/containers/*/*.log
    Parser            docker
    Tag               docker.*
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On
    DB                /fluent-bit/state/docker.db

# FILTER: enrich app logs
[FILTER]
    Name          record_modifier
    Match         app.logs
    Record        service   app
    Record        source    file
    Record        env       production
    Record        pipeline  fluent-bit

# FILTER: enrich docker logs
# 
[FILTER]
    Name          record_modifier
    Match         docker.*
    Record        source    docker
    Record        env       production
    Record        pipeline  fluent-bit

# FILTER: parse docker log JSON field properly
[FILTER]
    Name   parser
    Match  docker.*
    Key_Name log
    Parser docker_json
    Reserve_Data On
    Preserve_Key On

# OUTPUT 1: app logs index
[OUTPUT]
    Name               es
    Match              app.logs
    Host               elasticsearch
    Port               9200
    Index              fluent-bit-app
    Suppress_Type_Name On

# OUTPUT 2: docker logs index
[OUTPUT]
    Name               es
    Match              docker.*
    Host               elasticsearch
    Port               9200
    Index              fluent-bit-docker
    Suppress_Type_Name On

# OUTPUT 3: debug
[OUTPUT]
    Name    stdout
    Match   *
    Format  json_lines
