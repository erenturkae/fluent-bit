[SERVICE]
    Flush         2
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf

# INPUT 1: App file logs
[INPUT]
    Name              tail
    Path              /logs/app.log
    Parser            json
    Tag               app.logs
    Refresh_Interval  2
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On

# INPUT 2: Docker container logs
[INPUT]
    Name forward
    Listen 0.0.0.0
    Port 24224
    Tag docker.logs

# FILTER: enrich app logs
[FILTER]
    Name          record_modifier
    Match         app.logs
    Record        service   app
    Record        source    file
    Record        env       production
    Record        pipeline  fluent-bit

# FILTER: enrich docker logs
# 
[FILTER]
    Name          record_modifier
    Match         docker.logs
    Record        source    docker
    Record        env       production
    Record        pipeline  fluent-bit

# FILTER: parse docker log JSON field properly
[FILTER]
    Name         parser
    Match        docker
    Key_Name     log
    Parser       json
    Reserve_Data On

# OUTPUT 1: app logs index
[OUTPUT]
    Name               es
    Match              app.logs
    Host               elasticsearch
    Port               9200
    Index              fluent-bit-app
    Suppress_Type_Name On

# OUTPUT 2: docker logs index
[OUTPUT]
    Name               es
    Match              docker.logs
    Host               elasticsearch
    Port               9200
    Index              fluent-bit-docker
    Suppress_Type_Name On

# OUTPUT 3: debug
[OUTPUT]
    Name    stdout
    Match   *
    Format  json_lines
